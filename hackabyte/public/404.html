<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Auto-redirect after 5 seconds -->
  <meta http-equiv="refresh" content="5;url=/">
  <title>Hackabyte - Page Not Found</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #FF2247;
      font-size: 3rem;
      margin-bottom: 10px;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      background-color: #FF2247;
      color: #fff;
      padding: 10px 20px;
      margin: 10px;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
      transition: background-color 0.3s;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #FF3557;
    }
    .btn-secondary {
      background-color: #333;
    }
    .btn-secondary:hover {
      background-color: #444;
    }
    #countdown {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <div>
      <a href="/" class="btn">Go to Homepage</a>
      <a href="/events" class="btn btn-secondary">Browse Events</a>
    </div>
    <div id="countdown">Redirecting to homepage in 5 seconds...</div>
  </div>
  <script>
    // Countdown timer
    let seconds = 5;
    const countdownEl = document.getElementById('countdown');
    
    const interval = setInterval(() => {
      seconds--;
      countdownEl.textContent = `Redirecting to homepage in ${seconds} second${seconds !== 1 ? 's' : ''}...`;
      
      if (seconds <= 0) {
        clearInterval(interval);
      }
    }, 1000);
    
    // Ensure links work with direct assignment
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = this.getAttribute('href');
      });
    });
  </script>
</body>
</html>
