<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hackabyte - Page Not Found</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #FF2247;
      font-size: 3rem;
      margin-bottom: 10px;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      background-color: #FF2247;
      color: #fff;
      padding: 10px 20px;
      margin: 10px;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    .btn:hover {
      background-color: #FF3557;
    }
    .btn-secondary {
      background-color: #333;
    }
    .btn-secondary:hover {
      background-color: #444;
    }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <div>
      <button onclick="goToHome()" class="btn">Go to Homepage</button>
      <button onclick="goToEvents()" class="btn btn-secondary">Browse Events</button>
    </div>
  </div>
  <script>
    // Functions to handle navigation with full URLs
    function goToHome() {
      // Get the base URL from the current location
      var baseUrl = window.location.protocol + '//' + window.location.host;
      window.location.href = baseUrl + '/';
    }
    
    function goToEvents() {
      // Get the base URL from the current location
      var baseUrl = window.location.protocol + '//' + window.location.host;
      window.location.href = baseUrl + '/events';
    }
  </script>
</body>
</html>
